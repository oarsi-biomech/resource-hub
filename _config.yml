title: OARSI Biomechanics Resource Hub
description: A community-driven directory for osteoarthritis biomechanics labs, groups, and centers.

theme: minima

header_pages: []

exclude:
  - CLAUDE.md
  - CONTRIBUTING.md
  - MAINTAINERS.md
  - templates/

collections:
  labs:
    output: true
    permalink: /labs/:name/

defaults:
  - scope:
      path: ""
      type: labs
    values:
      layout: default

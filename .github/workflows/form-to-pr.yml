name: Auto-PR from Issue Form

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-new-entry:
    if: startsWith(github.event.issue.title, '[New Entry]:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write issue body to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body || '');

      - name: Install dependencies
        run: pip install pyyaml -q

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process new entry form
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/form_to_pr.py new /tmp/issue_body.txt

  process-update-entry:
    if: startsWith(github.event.issue.title, '[Update Entry]:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write issue body to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body || '');

      - name: Install dependencies
        run: pip install pyyaml -q

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process update entry form
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/form_to_pr.py update /tmp/issue_body.txt
